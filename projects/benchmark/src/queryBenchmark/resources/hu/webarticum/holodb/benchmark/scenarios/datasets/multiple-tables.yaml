seed: 98765
schemas:
  - name: benchmark
    tables:
      - name: students
        size: 15000
        columns:
          - name: id
            mode: counter
          - name: firstname
            valuesBundle: forenames
          - name: lastname
            valuesBundle: surnames
          - name: birth_year
            valuesRange: [1940, 2005]
      - name: subjects
        size: 137
        columns:
          - name: id
            mode: counter
          - name: code
            valuesPattern: '[A-F]{3}\-[0-9]{5}'
          - name: name
            valuesTextKind: title
      - name: courses
        size: 710
        columns:
          - name: id
            mode: counter
          - name: subject_id
            valuesForeignColumn: [ subjects, id ]
          - name: room
            valuesPattern: '[A-Z][0-9]\.[0-2][0-9]{2}'
      - name: applications
        size: 125000
        columns:
          - name: id
            mode: counter
          - name: course_id
            valuesForeignColumn: [ courses, id ]
          - name: student_id
            valuesForeignColumn: [ students, id ]
